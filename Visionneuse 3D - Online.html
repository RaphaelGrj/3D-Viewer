<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio 3D Figurine : Version Intégrale</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a1a1a; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        #bouton-menu { position: absolute; top: 15px; left: 15px; z-index: 100; background: #ffae00; color: #111; border: none; padding: 10px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        #panneau-controle { position: absolute; top: 60px; left: 15px; background: rgba(20, 20, 20, 0.95); border-radius: 8px; border: 1px solid #444; width: 340px; box-shadow: 0 4px 15px rgba(0,0,0,0.8); z-index: 90; transition: transform 0.3s; max-height: 85vh; overflow-y: auto; }
        #panneau-controle.cache { transform: translateX(-120%); opacity: 0; pointer-events: none; }
        .categorie-header { background: #333; padding: 12px 15px; cursor: pointer; border-bottom: 1px solid #222; font-weight: bold; color: #00e5ff; display: flex; justify-content: space-between; align-items: center; user-select: none; }
        .categorie-header.actif .icone-fleche { transform: rotate(180deg); }
        .categorie-contenu { background: rgba(10, 10, 10, 0.5); padding: 0 15px; max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out, padding 0.3s; }
        label { font-size: 0.82em; display: block; margin-top: 8px; margin-bottom: 4px; color: #ccc;}
        .input-group { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
        .input-group input[type="range"] { flex: 1; }
        .input-group input[type="number"] { width: 60px; background: #111; border: 1px solid #555; color: #00e5ff; padding: 2px; border-radius: 3px; font-size: 0.8em; }
        input[type="file"], select, button.action-btn { width: 100%; margin-bottom: 5px; background: #222; padding: 8px; border-radius: 4px; color: white; border: 1px solid #555; cursor: pointer; }
        button.action-btn { background: #0088ff; border: none; font-weight: bold; margin-top: 5px; }
        button.tool-btn { background: #333; border: 1px solid #444; color: #00e5ff; font-size: 0.75em; padding: 5px; cursor: pointer; border-radius: 3px; flex: 1; margin: 0 2px; }
        button.tool-btn.actif { background: #00e5ff; color: #000; font-weight: bold; }
        .compass-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 3px; }
        .compass-btn { background: #333; border: 1px solid #555; color: white; padding: 8px 0; font-size: 0.7em; text-align: center; cursor: pointer; border-radius: 3px; }
        .compass-btn.spec { background: #444; font-weight: bold; color: #ffae00; }
        input[type="color"] { width: 100%; height: 30px; border: none; background: none; cursor: pointer;}
        input[type="checkbox"] { transform: scale(1.1); margin-right: 8px; accent-color: #ffae00; }
        .mesures-box { background: #111; border: 1px solid #00e5ff; color: #00e5ff; padding: 8px; text-align: center; font-family: monospace; font-size: 0.85em; border-radius: 4px; margin-top: 5px;}
        #ruler-label { position: absolute; background: rgba(0,0,0,0.8); color: #00ff00; padding: 2px 8px; border-radius: 4px; font-size: 13px; pointer-events: none; display: none; z-index: 1000; font-family: monospace; border: 1px solid #00ff00; font-weight: bold; }
        hr { border: 0; border-top: 1px solid #444; margin: 12px 0; }
signature-claire {
    position: absolute;
    bottom: 10px;
    right: 15px;
    font-size: 10px;
    color: rgba(255, 255, 255, 0.3); /* Gris très clair et transparent */
    pointer-events: none; /* Pour ne pas gêner le clic sur la 3D */
    font-family: sans-serif;
    z-index: 1000;
}
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/STLLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/exporters/STLExporter.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<body>

    <div id="ruler-label">0 mm</div>
    <button id="bouton-menu">☰ Menu</button>

    <div id="panneau-controle">
        <div class="categorie-header actif">📁 1. Modèles & Socles <span class="icone-fleche">▼</span></div>
        <div class="categorie-contenu">
            <label>Ajouter STL :</label>
            <input type="file" id="uploadFichier" accept=".stl">
            <hr>
            <div style="display:flex; gap:10px; margin-bottom:5px;">
                <select id="tailleSocle" style="margin:0;"><option value="25">25 mm</option><option value="32" selected>32 mm</option><option value="40">40 mm</option></select>
                <label style="margin:0; display:flex; align-items:center;"><input type="checkbox" id="rochersSocle"> Rochers</label>
            </div>
            <button id="btnAjouterSocle" class="action-btn">Créer le Socle</button>
        </div>

        <div class="categorie-header">🛠️ 2. Édition & Kitbash <span class="icone-fleche">▼</span></div>
        <div class="categorie-contenu">
            <label>Sélection :</label>
            <select id="listeObjets"><option value="-1">-- Aucun --</option></select>
            <div style="display:flex; margin:10px 0;">
                <button class="tool-btn" id="btnObjDep">🖐 Pos.</button>
                <button class="tool-btn" id="btnObjRot">🔄 Rot.</button>
                <button class="tool-btn" id="btnObjEch">↗️ Tail.</button>
            </div>
            <div id="mesuresBox" class="mesures-box">Dim : 0x0x0</div>
            <label>Position X / Y (Profondeur) / Z (Hauteur)</label>
            <div class="input-group"><input type="range" id="posX" min="-100" max="100" step="0.1" value="0"><input type="number" id="numPosX" value="0"></div>
            <div class="input-group"><input type="range" id="posY" min="-100" max="100" step="0.1" value="0"><input type="number" id="numPosY" value="0"></div>
            <div class="input-group"><input type="range" id="posZ" min="-100" max="100" step="0.1" value="0"><input type="number" id="numPosZ" value="0"></div>
            <label>Échelle globale (%)</label>
            <input type="number" id="numEchelle" value="100" style="width:100%; background:#111; border:1px solid #555; color:#00e5ff; padding:5px; border-radius:3px;">
            <button id="btnSupprimer" class="action-btn" style="background:#666; margin-top:10px;">🗑️ Supprimer</button>
            <button id="btnExporter" class="action-btn" style="background:#ff4444;">💾 EXPORTER STL</button>
        </div>

        <div class="categorie-header">📏 3. Règle de Mesure <span class="icone-fleche">▼</span></div>
        <div class="categorie-contenu">
            <label style="color:#00ff00; font-weight:bold;"><input type="checkbox" id="checkRuler"> Activer la règle</label>
            <button class="action-btn" id="btnResetRuler" style="background:#444;">Effacer mesure</button>
        </div>

        <div class="categorie-header">☀️ 4. Lumière Globale <span class="icone-fleche">▼</span></div>
        <div class="categorie-contenu">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <label><input type="checkbox" id="lumOn" checked> Allumer</label>
                <div style="display:flex; gap:3px;">
                    <button class="tool-btn" onclick="placerLumiereZenithale()">☀️ Zénithal</button>
                    <button class="tool-btn" id="btnDragLum">🖐 Gizmo</button>
                </div>
            </div>
            <label>Intensité :</label>
            <input type="range" id="intensiteP" min="0" max="5" step="0.1" value="1.2">
            <label>Position X / Y / Z</label>
            <div class="input-group"><input type="range" id="lumX" min="-150" max="150" value="30"><input type="number" id="numLumX" value="30"></div>
            <div class="input-group"><input type="range" id="lumY" min="-150" max="150" value="50"><input type="number" id="numLumY" value="50"></div>
            <div class="input-group"><input type="range" id="lumZ" min="-50" max="250" value="150"><input type="number" id="numLumZ" value="150"></div>
        </div>

        <div class="categorie-header">🔥 5. Lumière OSL <span class="icone-fleche">▼</span></div>
        <div class="categorie-contenu">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <label><input type="checkbox" id="oslOn" checked> Allumer</label>
                <button class="tool-btn" id="btnDragOsl">🖐 Gizmo</button>
            </div>
            <input type="color" id="couleurOSL" value="#ff3300">
            <label>Intensité :</label>
            <input type="range" id="intensiteOSL" min="0" max="10" step="0.1" value="2">
            <label>Position X / Y / Z</label>
            <div class="input-group"><input type="range" id="oslX" min="-100" max="100" value="-30"><input type="number" id="numOslX" value="-30"></div>
            <div class="input-group"><input type="range" id="oslY" min="-100" max="100" value="30"><input type="number" id="numOslY" value="30"></div>
            <div class="input-group"><input type="range" id="oslZ" min="-50" max="150" value="20"><input type="number" id="numOslZ" value="20"></div>
        </div>

        <div class="categorie-header">🎨 6. Matériaux & NMM <span class="icone-fleche">▼</span></div>
        <div class="categorie-contenu">
            <label>Aspect :</label>
            <select id="choixMatcap"><option value="aucun">Mode Peinture (Standard)</option><option value="resine">Résine Grise</option><option value="cire">Cire Rouge</option></select>
            <label>Couleur / Métal / Lisse</label>
            <input type="color" id="couleurBase" value="#888888">
            <input type="range" id="metalness" min="0" max="1" step="0.05" value="0.8">
            <input type="range" id="roughness" min="0" max="1" step="0.05" value="0.2">
        </div>

        <div class="categorie-header">📸 7. Caméra & Fond <span class="icone-fleche">▼</span></div>
        <div class="categorie-contenu">
            <div class="compass-grid">
                <button class="compass-btn" onclick="placerCamera(-106, 106, 20)">↖</button>
                <button class="compass-btn" onclick="placerCamera(0, 150, 20)">↑ DOS</button>
                <button class="compass-btn" onclick="placerCamera(106, 106, 20)">↗</button>
                <button class="compass-btn" onclick="placerCamera(-150, 0, 20)">← G.</button>
                <button class="compass-btn spec" onclick="placerCamera(0, 0, 150)">📷 TOP</button>
                <button class="compass-btn" onclick="placerCamera(150, 0, 20)">D. →</button>
                <button class="compass-btn" onclick="placerCamera(-106, -106, 20)">↙</button>
                <button class="compass-btn spec" onclick="placerCamera(0, -150, 20)">📷 FACE</button>
                <button class="compass-btn" onclick="placerCamera(106, -106, 20)">↘</button>
            </div>
            <button class="compass-btn spec" style="width: 100%; margin-top:3px;" onclick="placerCamera(0, 0, -150)">⬇ DESSOUS</button>
            <label>Fond :</label>
            <input type="color" id="couleurFond" value="#1a1a1a">
            <label><input type="checkbox" id="modeVitrine"> Rotation automatique</label>
        </div>
    </div>
